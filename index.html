window.delOrder=id=>{
  if(!can('delete_orders')){toast('Sifarişi silmə icazəniz yoxdur',1);return}
  const o=(DB.get('orders')).find(x=>x.id===id);
  if(!o){toast('Sifariş tapılmadı',1);return}
  if(!confirm(`"${o.name} ${o.surname||''}" — sifariş №${o.id}\n\nBu sifarişi silmək istəyirsiniz?\nBu əməliyyat geri alına bilməz!`))return;
  // Удаляем связанные переводы
  const allTrans=DB.get('trans');
  const filteredTrans=allTrans.filter(t=>t.orderId!==id);
  if(filteredTrans.length!==allTrans.length)DB.set('trans',filteredTrans);
  // Удаляем заказ
  const allOrders=DB.get('orders').filter(x=>x.id!==id);
  DB.set('orders',allOrders);
  logAct('order_deleted','order',{id,name:o.name,total:o.totalPrice});
  toast('🗑️ Sifariş silindi: '+id);
  closeOverlay();
  if(['dashboard','services','finance'].includes(page))render(page);
};

window.setEditStatus=(status,label)=>{
  const h=document.getElementById('e_status');if(h)h.value=status;

      :'background:rgba(255,255,255,.05);color:var(--text2);border-color:var(--border)';
  });

window.saveEditOrder=async oid=>{
  const g=id=>document.getElementById(id)?.value||'';
  const totalPrice=parseFloat(g('e_total'))||0;
  const paidAmount=parseFloat(g('e_paid'))||0;
  const rusum=parseFloat(g('e_rusum'))||0;
  const currency=g('e_currency')||'azn';
  const status=g('e_status')||'new';
  const updates={
    name:g('e_name').trim(),surname:g('e_surname').trim(),
    passport:g('e_passport').trim(),phone:g('e_phone').trim(),
    totalPrice,paidAmount,rusum,currency,status,
    debtAmount:totalPrice-paidAmount,
    netIncome:totalPrice-rusum,
    notes:g('e_notes').trim(),
    deadline:g('e_deadline').trim()
  };
  const all=DB.get('orders');
  const o=all.find(x=>x.id===oid)||all.find(x=>eA(x.id)===oid);
  if(!o){toast('Sifariş tapılmadı',1);return}
  Object.assign(o,updates);
  // Пересчитываем dutyDebt при изменении rusum
  o.dutyPaid=(o.dutyPayments||[]).reduce((s,p)=>s+(p.amount||0),0);
  o.dutyDebt=Math.max(0,(o.rusum||0)-o.dutyPaid);
  (o.payments||[]).forEach(p=>{p.currency=currency});
  (o.statusHistory=o.statusHistory||[]).push({status,label:SVC_STATUSES.find(s=>s.id===status)?.label||status,who:me.name,t:Date.now()});
  await DB.set('orders',all);
  logAct('order_edited','order',{id:oid});
  toast('✅ Dəyişikliklər saxlanıldı');
  closeOverlay();
  render(page);
};

window.changeOrderStatus=(id,status,label)=>{
  const all=DB.get('orders');const o=all.find(x=>x.id===id);if(!o)return;
  o.status=status;(o.statusHistory=o.statusHistory||[]).push({status,label,who:me.name,t:Date.now()});
  DB.set('orders',all);logAct('status_change','order',{id,status});
  toast(`Status: ${label}`);closeOverlay();setTimeout(()=>viewOrder(id),300);
};

  const rc={admin:'#6366f1',manager:'#10b981',operator:'#f59e0b',courier:'#3b82f6',translator:'#8b5cf6'};
  return notes.map(n=>`<div class="note-msg"><div class="note-avatar" style="background:${rc[n.role]||'#6366f1'}">${(n.author||'?')[0].toUpperCase()}</div><div class="note-body"><div class="note-header"><span class="note-author">${esc(n.author)}</span><span class="note-role-txt">${ROLES_LIST.find(r=>r.id===n.role)?.name||n.role}</span><span class="note-time">${fmtDate(n.t)}</span></div><div class="note-text">${esc(n.text)}</div></div></div>`).join('');
}

window.addNote=id=>{
  const input=document.getElementById(`noteInput_${id}`);
  const text=input?.value.trim();if(!text)return;
  const all=DB.get('orders');const o=all.find(x=>x.id===id);if(!o)return;
  (o.internalNotes=o.internalNotes||[]).push({id:uid('N'),text,author:me.name,authorId:me.id,role:myRole,t:Date.now()});
  DB.set('orders',all);
  const nl=document.getElementById(`notesList_${id}`);if(nl){nl.innerHTML=renderNotes(o.internalNotes);nl.scrollTop=nl.scrollHeight}
  if(input){input.value='';input.style.height='auto'}
  logAct('note_added','order',{id});
};

window.showScanSection=async type=>{
  document.querySelectorAll('.scan-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.scan-choice-btn').forEach(b=>b.classList.remove('active'));
  const sec=document.getElementById('scanSection_'+type);
  if(sec)sec.classList.add('active');
  // Подсвечиваем нажатую кнопку
  const btns=document.querySelectorAll('.scan-choice-btn');
  if(type==='scanner'&&btns[0])btns[0].classList.add('active');
  if(type==='camera'&&btns[1])btns[1].classList.add('active');
  if(type==='camera')await startScanCamera();
  else stopScanner(); // закрываем камеру если переключились на скaner
};

// Переменная для смены камер
let _facingMode='environment';

async function startScanCamera(){
  const video=document.getElementById('scanCamVideo');
  const status=document.getElementById('scanCamStatus');
  const btn=document.getElementById('scanCaptureBtn');
  if(!video)return;
  stopScanner(); // сначала остановим предыдущий поток
  if(!navigator.mediaDevices?.getUserMedia){
    if(status)status.innerHTML='<div style="color:var(--red);font-size:.8rem">Bu brauzerdə kamera dəstəklənmir</div>';
    return;
  }
  try{
    if(status){status.style.display='flex';status.innerHTML='<div style="font-size:.82rem;color:var(--text2)">Kamera açılır...</div>'}
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:_facingMode,width:{ideal:1280},height:{ideal:720}}
    });
    _scanStream=stream;
    video.srcObject=stream;
    video.onloadedmetadata=()=>{
      video.play();
      if(status)status.style.display='none';
      if(btn){btn.disabled=false;btn.style.opacity='1'}
    };
  }catch(err){
    console.warn('Camera:',err.name,err.message);
    const msgs={
      NotAllowedError:'Kamera icazəsi rədd edildi. Brauzer ayarlarından icazə verin.',
      NotFoundError:'Kamera tapılmadı. Kamera qoşulu olduğunu yoxlayın.',
      OverconstrainedError:'Kamera parametrləri dəstəklənmir.',
      NotReadableError:'Kamera başqa proqram tərəfindən istifadə olunur.'
    };
    const msg=msgs[err.name]||'Kamera xətası: '+err.message;
    if(status)status.innerHTML=`<div style="text-align:center;padding:16px"><i class="fas fa-triangle-exclamation" style="color:var(--red);font-size:1.5rem;margin-bottom:8px;display:block"></i><div style="color:var(--red);font-size:.78rem">${esc(msg)}</div></div>`;
  }
}

window.switchCamera=async ()=>{
  _facingMode=_facingMode==='environment'?'user':'environment';
  toast('Kamera dəyişdirilir...');
  await startScanCamera();
};

window.captureFromCamera=()=>{
  const video=document.getElementById('scanCamVideo');
  if(!video||video.readyState<2||!video.videoWidth){toast('Kamera hazır deyil',1);return}
  const canvas=document.createElement('canvas');
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  canvas.toBlob(blob=>{
    if(!blob){toast('Şəkil çəkilmədi',1);return}
    const file=new File([blob],`scan_${Date.now()}.jpg`,{type:'image/jpeg'});
    if(_scanOrderId)processFiles([file],'scan',_scanOrderId);
    else processFiles([file],'temp');
    closeScanner();
    toast('📄 Skan əlavə edildi');
  },'image/jpeg',0.9);
};

window.handleScanFile=e=>{
  const files=[...e.target.files];if(!files.length)return;
  files.forEach(file=>{
    if(_scanOrderId)processFiles([file],'scan',_scanOrderId);
    else processFiles([file],'temp');
  });
  e.target.value='';
  closeScanner();
};
window.handleScanDrop=e=>{
  e.preventDefault();
  const files=[...e.dataTransfer.files];if(!files.length)return;
  files.forEach(file=>{
    if(_scanOrderId)processFiles([file],'scan',_scanOrderId);
    else processFiles([file],'temp');
  });
  closeScanner();
};

function amountByCurrency(items,getAmount,getCurrency){
  const out={};
  items.forEach(item=>{
    const curr=currencyId(getCurrency(item));
    const amount=Number(getAmount(item))||0;
    if(!amount)return;
    out[curr]=(out[curr]||0)+amount;
  });
  return out;
}

function renderAmountPills(map,empty='0.00 ₼'){
  const keys=Object.keys(map||{}).sort();

}

// ─── FINANCE — separated multi-currency accounting ───────────────────────────
const monthKey=t=>{
  const d=new Date(t||Date.now());
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
};
// ── Finance date-range + office filter ───────────────────────────────────
const _td=new Date();
let _finFrom=_td.getFullYear()+'-'+String(_td.getMonth()+1).padStart(2,'0')+'-01';
let _finTo=_td.getFullYear()+'-'+String(_td.getMonth()+1).padStart(2,'0')+'-'+String(new Date(_td.getFullYear(),_td.getMonth()+1,0).getDate()).padStart(2,'0');
let _finOffice='';
if(!_financeMonth)_financeMonth=monthKey(Date.now());
const dateToDay=t=>{if(!t)return'';const d=new Date(t);if(isNaN(d))return'';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const inFinancePeriod=t=>{
  if(!_finFrom&&!_finTo)return true;
  const day=dateToDay(t);if(!day)return false;
  if(_finFrom&&day<_finFrom)return false;
  if(_finTo&&day>_finTo)return false;
  return true;
};
const financeBucket=()=>({orderTotal:0,income:0,expense:0,rusum:0,debt:0,balance:0,orders:0,payments:0,expenses:0,byMethod:{}});
const touchBucket=(map,curr)=>{
  curr=currencyId(curr);
  if(!map[curr])map[curr]=financeBucket();
  return map[curr];
};
const addMoney=(map,curr,field,amount)=>{
  const b=touchBucket(map,curr);
  b[field]+=(Number(amount)||0);
  return b;
};
const finalizeFinanceMap=map=>{
  Object.values(map).forEach(b=>{b.balance=b.income-b.expense});
  return map;
};
const financeCurrencies=map=>Object.keys(map||{}).sort((a,b)=>{
  const order=['azn','try','usd','eur'];
  return (order.indexOf(a)<0?99:order.indexOf(a))-(order.indexOf(b)<0?99:order.indexOf(b))||a.localeCompare(b);
});
const financeDisplayCurrencies=map=>{
  const base=['azn','try','usd'];
  const extra=financeCurrencies(map).filter(c=>!base.includes(c));
  return [...base,...extra];
};
function renderFinancePills(map,field){
  return financeDisplayCurrencies(map).map(curr=>{
    const v=(map[curr]?.[field]||0);
    const meta=currencyMeta(curr);
    return '<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid var(--border);font-size:.78rem;font-weight:800;color:#fff">'+meta.flag+' '+money(v,curr)+'</span>';
  }).join('');
}
function renderFinanceSummaryTiles(map){
  return(
    '<div class="fin-cards-row" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:18px">'+

function summarizeFinanceData(ordersList,expensesList){
  const company={};
  const offices={};
  OFFICES.forEach(o=>{offices[o.id]={}});

  const addBoth=(office,curr,field,amount)=>{
    addMoney(company,curr,field,amount);
    addMoney(offices[office]||(offices[office]={}),curr,field,amount);
  };

  ordersList.forEach(o=>{
    if(_finOffice&&o.office!==_finOffice)return;
    const office=o.office||'';
    const curr=o.currency||'azn';
    if(inFinancePeriod(o.createdAt)){
      const co=addMoney(company,curr,'orderTotal',o.totalPrice||0);co.orders+=1;
      const oo=addMoney(offices[office]||(offices[office]={}),curr,'orderTotal',o.totalPrice||0);oo.orders+=1;
      addBoth(office,curr,'debt',Math.max(0,o.debtAmount||0));
    }
    // Rusum — считаем по dutyPayments (фактическая дата оплаты пошлины)
    const dutyPays=(o.dutyPayments||[]).length
      ? o.dutyPayments
      : (o.rusum>0?[{amount:o.rusum,currency:curr,paymentDate:o.createdAt,date:o.createdAt}]:[]);
    dutyPays.forEach(dp=>{
      if(!inFinancePeriod(dp.paymentDate||dp.date||o.createdAt))return;
      addBoth(office,dp.currency||curr,'expense',dp.amount||0);
      addBoth(office,dp.currency||curr,'rusum',dp.amount||0);
    });
    const pays=(o.payments||[]).length?o.payments:(o.paidAmount>0?[{amount:o.paidAmount,currency:curr,date:o.createdAt,method:o.payMethod}]:[]);
    pays.forEach(p=>{
      if(!inFinancePeriod(p.paymentDate||p.date||o.createdAt))return;
      const pc=p.currency||curr;
      const c=addMoney(company,pc,'income',p.amount||0);c.payments+=1;
      const off=addMoney(offices[office]||(offices[office]={}),pc,'income',p.amount||0);off.payments+=1;
      if(p.method){
        const cb=touchBucket(company,pc);cb.byMethod[p.method]=(cb.byMethod[p.method]||0)+(p.amount||0);
      }
    });
  });

  expensesList.forEach(e=>{
    if(_finOffice&&e.office!==_finOffice)return;
    if(!inFinancePeriod(e.expenseDate||e.createdAt))return;
    const curr=e.currency||'azn';
    const office=e.office||'';
    const c=addMoney(company,curr,'expense',e.amount||0);c.expenses+=1;
    const o=addMoney(offices[office]||(offices[office]={}),curr,'expense',e.amount||0);o.expenses+=1;
  });

  finalizeFinanceMap(company);
  Object.values(offices).forEach(finalizeFinanceMap);
  return{company,offices};
}

  const role=document.getElementById('s_role')?.value;
  const preset=ROLE_PRESETS[role]||{};
  Object.keys(ALL_PERMS).forEach(k=>{
    const cb=document.getElementById('perm_'+k);
    const wrap=cb?.closest('.perm-item');
    if(cb){cb.checked=!!preset[k];wrap?.classList.toggle('checked',!!preset[k])}
  });
};

window.togglePerm=k=>{
  const cb=document.getElementById('perm_'+k);const wrap=cb?.closest('.perm-item');
  if(cb){cb.checked=!cb.checked;wrap?.classList.toggle('checked',cb.checked)}
};

window.saveStaff=async id=>{
  if(!(can('manage_users')||isAdmin())){toast('İcazəniz yoxdur',1);return}
  const office=document.querySelector('input[name="soffice"]:checked')?.value;
  const name=document.getElementById('s_name')?.value.trim();
  const surname=document.getElementById('s_surname')?.value.trim()||'';
  const phone=document.getElementById('s_phone')?.value.trim()||'';
  const username=document.getElementById('s_username')?.value.trim();
  const password=document.getElementById('s_password')?.value;
  const role=document.getElementById('s_role')?.value;
  const active=parseInt(document.getElementById('s_active')?.value)||0;
  if(!office){toast('Ofis seçin',1);return}
  if(!name){toast('Ad tələb olunur',1);return}
  if(!username){toast('İstifadəçi adı tələb olunur',1);return}
  if(!id&&!password){toast('Şifrə tələb olunur',1);return}
  const dup=staff.find(s=>s.username===username&&s.id!==id);
  if(dup){toast('Bu istifadəçi adı artıq mövcuddur',1);return}
  const customPerms=Object.fromEntries(Object.keys(ALL_PERMS).map(k=>[k,document.getElementById('perm_'+k)?.checked?1:0]));
  const all=DB.get('staff');
  if(id){
    const emp=all.find(s=>s.id===id)||all.find(s=>eA(s.id)===id);
    if(!emp){toast('İşçi tapılmadı',1);return}
    Object.assign(emp,{name,surname,phone,username,role,office,active,customPerms});
    if(password)emp.password=password;
  } else {
    all.push({id:uid('STF'),name,surname,phone,username,password,role,office,active,customPerms,createdAt:Date.now()});
  }
  await DB.set('staff',all);
  logAct(id?'staff_updated':'staff_created','staff',{name,username,role,office});
  toast(`✅ ${id?'Yeniləndi':'İşçi yaradıldı'}: ${name}`);
  closeOverlay();buildSidebar();render('users');
};

window.delStaff=async id=>{
  if(!(can('manage_users')||isAdmin())){toast('İcazəniz yoxdur',1);return}
  const target=staff.find(x=>x.id===id)||staff.find(x=>eA(x.id)===id);
  if(!target){toast('İşçi tapılmadı',1);return}
  if((target?.id||id)===me?.id){toast('Öz hesabınızı silə bilməzsiniz',1);return}
  const s=target;
  if(!confirm(`"${s?.name}" silinsin?`))return;
  const next=DB.get('staff').filter(x=>x.id!==(target?.id||id));
  await DB.set('staff',next);
  logAct('staff_deleted','staff',{id});
  toast('Silindi');
  buildSidebar();
  render('users');
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
// БАГ 12 FIX v2: немедленное закрытие без зависаний
// stopScanner — освобождает камеру (можно вызывать когда угодно)
function stopScanner(){
  if(_scanStream){
    try{_scanStream.getTracks().forEach(t=>{try{t.stop();t.enabled=false}catch{}})}catch{}
    _scanStream=null;
  }
  try{
    ['scanCamVideo','modalVideo'].forEach(id=>{
      const v=document.getElementById(id);
      if(v){try{v.pause();}catch{}v.srcObject=null;}
    });
  }catch{}
}
window.stopScanner=stopScanner; // доступна из HTML onclick

// closeOverlay — закрывает любой модал мгновенно
window.closeOverlay=()=>{
  stopScanner(); // сначала освобождаем камеру
  const ov=document.getElementById('overlay');
  if(!ov)return;
  ov.classList.remove('open');
  // Очищаем содержимое с небольшой задержкой, 
  // чтобы onclick на кнопке успел отработать
  setTimeout(()=>{if(!ov.classList.contains('open'))ov.innerHTML='';},50);
};

// closeScanner — доступна из HTML onclick (назначаем на window)
window.closeScanner=function(){
  closeOverlay();
};
// Алиас для удобства внутри module
function closeScanner(){closeOverlay();}

// Escape
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('overlay')?.classList.contains('open')){
    e.preventDefault();
    closeOverlay();
  }
});

// ─── FILE SIZE NOTE для пользователя ─────────────────────────────────────────
// LocalStorage ограничен ~5MB ВСЕГО (включая все данные CRM)
// Base64 кодировка увеличивает файл на 33%
// Файл 2MB → ~2.7MB в Base64 → быстро заполняет LocalStorage
// РЕШЕНИЕ: На сервере/VPS с S3 или Supabase Storage нет этого ограничения
// Реальный лимит на сервере: настраивается (обычно 100MB-5GB)

// ─── BOOT ─────────────────────────────────────────────────────────────────────
// БАГ 15 FIX: восстанавливаем сессию из sessionStorage
function tryRestoreSession(){
  try{
    const saved=sessionStorage.getItem('azd_session');
    if(!saved)return false;
    const {id,username,role}=JSON.parse(saved);
    const user=staff.find(e=>e.id===id&&e.username===username&&e.active);
    if(!user){sessionStorage.removeItem('azd_session');return false}
    me=user;myRole=user.role;
    document.getElementById('appRoot').innerHTML='';
    document.getElementById('app').style.display='block';
    document.getElementById('userAvatar').textContent=(user.name||'?')[0].toUpperCase();
    document.getElementById('userName').textContent=user.name+(user.surname?' '+user.surname:'');
    document.getElementById('userRole').textContent=ROLES_LIST.find(r=>r.id===myRole)?.name||myRole;
    buildSidebar();render('dashboard');
    return true;
  }catch{return false}
}

setTimeout(()=>{
  const s=document.getElementById('loadingScreen');
  if(s){s.style.transition='opacity .35s';s.style.opacity='0';setTimeout(()=>s.remove(),380)}
  if(!tryRestoreSession())showLogin();
},700);
console.log('✅ BY.NT CRM v10.0 — Session Fix, Blob Download, Scanner Lifecycle, Office Isolation, Translator Limits');
