<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BY.NT CRM v10</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<!-- Firebase SDK inline in main module -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#090d14;--surface:#111827;--card:#161e2e;
  --border:rgba(255,255,255,.07);
  --primary:#6366f1;--primary-dim:rgba(99,102,241,.13);
  --gold:#f59e0b;--gold-dim:rgba(245,158,11,.13);
  --green:#10b981;--green-dim:rgba(16,185,129,.13);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.13);
  --red:#ef4444;--red-dim:rgba(239,68,68,.13);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,.13);
  --cyan:#06b6d4;--cyan-dim:rgba(6,182,212,.13);
  --orange:#f97316;--wa:#25d366;
  --tr-color:#16a34a;--az-color:#1e40af;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --sidebar-w:252px;--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button,input,select,textarea,label{font-family:inherit}


/* BYNT LOGO — без черного фона */
.bynt-logo{
  display:block;background:transparent;border-radius:0;object-fit:contain;
}
.login-logo-img{
  width:150px;height:auto;margin:0 auto 18px;display:block;
  
  filter:drop-shadow(0 4px 20px rgba(212,175,55,.4));
}
.sb-logo-img{
  width:38px;height:38px;object-fit:contain;border-radius:0;
  background:transparent;flex-shrink:0;
  
}
.sb-logo-img-wide{
  width:auto;height:32px;object-fit:contain;max-width:130px;
}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 60% 20%,rgba(99,102,241,.06),transparent 60%),var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 36px;max-width:400px;width:100%;text-align:center}
.login-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 16px;box-shadow:0 4px 20px rgba(99,102,241,.35);color:#fff}
.login-title{font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:6px}
.login-sub{color:var(--text3);font-size:.83rem;margin-bottom:28px}
.inp-wrap{position:relative;margin-bottom:14px}
.inp-wrap .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.85rem;pointer-events:none}
.inp-wrap input{width:100%;padding:12px 14px 12px 40px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s}
.inp-wrap input:focus{border-color:var(--primary)}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),var(--purple));border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.95rem;margin-top:10px;cursor:pointer;transition:opacity .2s,transform .15s;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.login-hint{margin-top:18px;padding:12px 16px;background:rgba(255,255,255,.03);border-radius:10px;font-size:.76rem;color:var(--text2);line-height:1.8;text-align:left}

/* LAYOUT */
.app{display:none;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);position:fixed;left:0;top:0;height:100vh;display:flex;flex-direction:column;z-index:100}
.sb-head{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-brand-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;color:#fff}
.sb-brand-text h3{font-size:.92rem;font-weight:700;color:#fff;line-height:1}
.sb-brand-text span{font-size:.68rem;color:var(--text3)}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px}
.nav-section{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:10px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:var(--text2);font-size:.84rem;font-weight:500;background:none;border:none;width:100%;text-align:left;margin-bottom:2px;transition:all .18s;cursor:pointer}
.nav-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nav-item.active{background:var(--primary-dim);color:var(--primary);font-weight:600}
.nav-item .nav-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;background:rgba(255,255,255,.04);transition:all .18s}
.nav-item.active .nav-icon{background:var(--primary-dim);color:var(--primary)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:8px;min-width:18px;text-align:center}
.sb-footer{padding:10px 8px;border-top:1px solid var(--border)}
.sb-user-card{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.03);border-radius:10px;margin-bottom:8px}
.sb-avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:.88rem;flex-shrink:0}
.sb-uname{font-size:.83rem;font-weight:600;color:#fff;line-height:1.2}
.sb-urole{font-size:.68rem;color:var(--text3)}
.logout-btn{width:100%;padding:9px;border-radius:9px;background:var(--red-dim);border:1px solid rgba(239,68,68,.2);color:var(--red);font-weight:600;font-size:.8rem;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:background .18s}
.logout-btn:hover{background:rgba(239,68,68,.2)}

/* FINANCE PANEL */
.fin-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.fin-section-title{font-size:.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:10px 0 8px;border-bottom:1px solid rgba(245,158,11,.15);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.fin-cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.fin-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.fin-card .fc-label{font-size:.72rem;color:var(--text3);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fin-card .fc-value{font-size:1.5rem;font-weight:800;color:#fff;line-height:1}
.fin-card .fc-sub{font-size:.72rem;color:var(--text3);margin-top:5px}
.fin-card.positive .fc-value{color:var(--green)}
.fin-card.negative .fc-value{color:var(--red)}
.fin-card.neutral .fc-value{color:var(--gold)}
.fin-office-block{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.fin-office-head{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.fin-office-body{padding:14px 18px}
.fin-row2{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.83rem}
.fin-row2:last-child{border:none}
.fin-row2 .label{color:var(--text2);display:flex;align-items:center;gap:6px}
.fin-row2 .value{font-weight:700}
.fin-pay-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.fin-pay-item{background:rgba(255,255,255,.03);border-radius:8px;padding:10px;text-align:center}
.fin-pay-item .pi-label{font-size:.68rem;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:4px}
.fin-pay-item .pi-value{font-size:1rem;font-weight:700;color:#fff}
.money-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:18px}
.money-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:12px}
.money-card .money-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.money-card .money-title{font-size:.78rem;color:#fff;font-weight:700}
.money-card .money-sub{font-size:.68rem;color:var(--text3);margin-top:2px}
.money-lines{display:grid;gap:7px}
.money-line{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:.8rem}
.money-line span:first-child{color:var(--text2)}
.money-line strong{font-weight:800;color:#fff;text-align:right}
.money-line.in strong{color:var(--green)}
.money-line.out strong{color:var(--red)}
.money-line.debt strong{color:var(--gold)}
.money-line.balance strong.positive{color:var(--green)}
.money-line.balance strong.negative{color:var(--red)}
.finance-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.finance-filter{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.finance-filter label{font-size:.72rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.finance-note{font-size:.75rem;color:var(--text3)}

/* TOPBAR SEARCH */
.topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:56px;background:rgba(17,24,39,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;z-index:90}
.mob-menu-btn{display:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.mob-menu-btn:active{transform:translateY(1px)}
.global-search-wrap{position:relative;flex:1;max-width:480px}
.global-search-wrap .gs-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.85rem;pointer-events:none}
.global-search-wrap input{width:100%;padding:9px 12px 9px 36px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.84rem;outline:none;transition:border .2s}
.global-search-wrap input:focus{border-color:var(--primary);background:rgba(255,255,255,.06)}
.gs-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;max-height:340px;overflow-y:auto;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
.gs-results.open{display:block}
.gs-item{padding:10px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem}
.gs-item:last-child{border:none}
.gs-item:hover{background:rgba(255,255,255,.04)}
.gs-item-id{color:var(--gold);font-family:monospace;font-size:.74rem}
.gs-item-name{color:#fff;font-weight:600;margin-bottom:2px}
.gs-item-meta{color:var(--text3);font-size:.72rem}
.gs-empty{padding:20px;text-align:center;color:var(--text3);font-size:.82rem}
.office-badge{padding:2px 8px;border-radius:5px;font-size:.65rem;font-weight:700}
.office-tr{background:rgba(22,163,74,.15);color:#16a34a;border:1px solid rgba(22,163,74,.3)}
.office-az{background:rgba(30,64,175,.15);color:#1e40af;border:1px solid rgba(30,64,175,.3)}

/* MAIN */
.main-area{margin-left:var(--sidebar-w);min-height:100vh;padding:28px 32px;padding-top:80px}
.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-head h2{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:9px;color:#fff}
.ph-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.85rem;background:var(--primary-dim);color:var(--primary)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stats-grid.s4{grid-template-columns:repeat(4,1fr)}
.stats-grid.s3{grid-template-columns:repeat(3,1fr)}
.stats-grid.s2{grid-template-columns:repeat(2,1fr)}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:transform .2s,border-color .2s}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.12)}
.stat-card.tr-card{border-color:rgba(231,76,60,.2)}
.stat-card.az-card{border-color:rgba(52,152,219,.2)}
.stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.9rem;margin-bottom:12px}
.c1 .stat-icon{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.c2 .stat-icon{background:linear-gradient(135deg,#10b981,#06b6d4);color:#fff}
.c3 .stat-icon{background:linear-gradient(135deg,#ef4444,#f97316);color:#fff}
.c4 .stat-icon{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.c5 .stat-icon{background:linear-gradient(135deg,#f97316,#dc2626);color:#fff}
.c6 .stat-icon{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
.c7 .stat-icon{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff}
.stat-num{font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:4px;line-height:1}
.stat-label{font-size:.72rem;color:var(--text3);font-weight:500}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-input-wrap{position:relative;flex:1;min-width:220px}
.search-input-wrap .sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.85rem;pointer-events:none}
.search-input-wrap input{width:100%;padding:10px 12px 10px 36px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.85rem;outline:none;transition:border .2s}
.search-input-wrap input:focus{border-color:var(--primary)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;font-size:.82rem;font-weight:600;border:none;cursor:pointer;transition:opacity .18s,transform .15s;white-space:nowrap}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff}
.btn-success{background:linear-gradient(135deg,var(--green),var(--cyan));color:#fff}
.btn-warning{background:linear-gradient(135deg,var(--gold),var(--orange));color:#fff}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text2)}
.btn-wa{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff}
.btn-scan{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff}
.btn-red{background:linear-gradient(135deg,var(--red),var(--orange));color:#fff}
.btn-sm{padding:7px 13px;font-size:.76rem;border-radius:7px}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;-webkit-overflow-scrolling:touch}
.table-head,.table-row{display:grid;padding:12px 16px;gap:10px;align-items:center}
.table-head{background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);color:var(--text3);font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.table-row{border-bottom:1px solid rgba(255,255,255,.03);font-size:.84rem;transition:background .15s}
.table-row:last-child{border:none}
.table-row:hover{background:rgba(255,255,255,.02)}
.mono{font-family:'SF Mono','Fira Code',monospace;font-size:.78rem;color:var(--gold)}
.wa-link{display:inline-flex;align-items:center;gap:5px;background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.25);color:var(--wa);padding:4px 9px;border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s}
.wa-link:hover{background:rgba(37,211,102,.18)}

/* BADGES */
.badge{padding:3px 9px;border-radius:20px;font-size:.67rem;font-weight:700;display:inline-block;white-space:nowrap}
.badge-new{background:rgba(148,163,184,.15);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
.badge-progress{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(245,158,11,.25)}
.badge-completed{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.badge-sent{background:var(--cyan-dim);color:var(--cyan);border:1px solid rgba(6,182,212,.25)}
.badge-delivered{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(139,92,246,.25)}
.badge-review{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(139,92,246,.25)}
.badge-ready{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
.badge-done{background:var(--green-dim);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.badge-cancelled{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.25)}

/* ACTIONS */
.actions-bar{display:flex;gap:5px;flex-wrap:wrap}
.action-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .18s;background:rgba(255,255,255,.04);color:var(--text3)}
.action-btn:hover{transform:translateY(-1px)}
.ab-view{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,.25)}
.ab-edit{background:rgba(255,255,255,.06);color:var(--text2)}
.ab-qr{background:var(--gold-dim);color:var(--gold);border-color:rgba(245,158,11,.25)}
.ab-wa{background:rgba(37,211,102,.12);color:var(--wa);border-color:rgba(37,211,102,.25)}
.ab-del{background:var(--red-dim);color:var(--red);border-color:rgba(239,68,68,.2)}
.ab-scan{background:var(--cyan-dim);color:var(--cyan);border-color:rgba(6,182,212,.25)}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{width:56px;height:56px;border-radius:14px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin:0 auto 16px}
.empty-state p{font-size:.9rem;margin-bottom:18px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);z-index:1000;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px;max-width:600px;width:100%;position:relative;animation:mIn .22s ease;margin:auto}
.modal.wide{max-width:880px}
.modal.narrow{max-width:440px}
.modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text3);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s}
.modal-close:hover{background:var(--red-dim);color:var(--red)}
.modal-title{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:20px;display:flex;align-items:center;gap:9px;padding-right:40px}
.mt-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.82rem;flex-shrink:0}
.sec-label{font-size:.66rem;color:var(--gold);text-transform:uppercase;letter-spacing:.9px;margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid rgba(245,158,11,.15);font-weight:700}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;color:var(--text2);font-size:.77rem;margin-bottom:5px;font-weight:500}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.85rem;outline:none;transition:border .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary)}
.form-select option{background:var(--surface)}
.form-textarea{min-height:72px;resize:vertical;line-height:1.5}
.modal-footer{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
.save-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),var(--cyan));border:none;border-radius:9px;color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;transition:opacity .18s,transform .15s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.save-btn:hover{opacity:.9;transform:translateY(-1px)}

/* PERMISSIONS GRID */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.perm-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .18s}
.perm-item:hover{background:rgba(255,255,255,.05)}
.perm-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.perm-item label{cursor:pointer;font-size:.78rem;color:var(--text2);pointer-events:none}
.perm-item.checked{background:var(--primary-dim);border-color:rgba(99,102,241,.3)}
.perm-item.checked label{color:var(--primary)}

/* SERVICES CHECKBOXES */
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.svc-cb{display:flex;align-items:center;gap:9px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all .18s;user-select:none}
.svc-cb:hover{background:rgba(255,255,255,.05)}
.svc-cb.checked{background:var(--primary-dim);border-color:rgba(99,102,241,.35)}
.svc-cb input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
.svc-cb label{cursor:pointer;font-size:.82rem;color:var(--text);font-weight:500;pointer-events:none}
.svc-cb.checked label{color:var(--primary)}

/* TRANSLATION PANEL */
.translation-panel{display:none;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:14px;margin-bottom:14px;animation:mIn .2s}
.translation-panel.show{display:block}
.tp-title{font-size:.75rem;color:var(--primary);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* FINANCE */
.fin-block{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fin-row:last-child{border:none}
.fin-row.fin-total{padding:10px 0 4px}
.fin-label{color:var(--text2);font-size:.83rem;display:flex;align-items:center;gap:6px}
.fin-val{font-size:1rem;font-weight:700;color:var(--gold)}
.fin-val.green{color:var(--green)}
.fin-val.red{color:var(--red)}
.rusum-badge{font-size:.6rem;background:var(--orange);color:#fff;padding:1px 5px;border-radius:4px;font-weight:700;text-transform:uppercase}

/* STATUS HISTORY */
.sh-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sh-item:last-child{border:none}
.sh-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:5px}
.sh-body{flex:1}
.sh-action{font-size:.82rem;color:#fff;font-weight:600}
.sh-meta{font-size:.72rem;color:var(--text3);margin-top:2px}

/* FILES */
.file-drop-zone{border:2px dashed rgba(99,102,241,.35);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .25s;background:rgba(99,102,241,.04);position:relative}
.file-drop-zone:hover,.file-drop-zone.dragging{border-color:var(--primary);background:rgba(99,102,241,.1)}
.file-drop-zone input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.fdz-icon{width:44px;height:44px;border-radius:12px;background:var(--primary-dim);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin:0 auto 10px}
.fdz-text{font-size:.88rem;color:var(--text);font-weight:600;margin-bottom:4px}
.fdz-sub{font-size:.74rem;color:var(--text3)}
.fdz-formats{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.fdz-fmt{font-size:.62rem;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}
.file-list{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.file-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:9px;animation:mIn .2s}
.file-item:hover{border-color:rgba(255,255,255,.1)}
.fi-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.fi-pdf{background:rgba(239,68,68,.15);color:var(--red)}
.fi-doc{background:rgba(59,130,246,.15);color:var(--blue)}
.fi-img{background:rgba(16,185,129,.15);color:var(--green)}
.fi-zip{background:rgba(245,158,11,.15);color:var(--gold)}
.fi-xls{background:rgba(16,185,129,.15);color:var(--green)}
.fi-other{background:rgba(255,255,255,.08);color:var(--text2)}
.fi-body{flex:1;min-width:0}
.fi-name{font-size:.82rem;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-meta{font-size:.7rem;color:var(--text3);margin-top:2px}
.fi-actions{display:flex;gap:5px;flex-shrink:0}
.fi-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.72rem;transition:all .18s}
.fi-btn.dl{color:var(--blue);border-color:rgba(59,130,246,.25);background:var(--blue-dim)}
.fi-btn.rm{color:var(--red);border-color:rgba(239,68,68,.2);background:var(--red-dim)}

/* NOTES CHAT */
.notes-chat{display:flex;flex-direction:column;gap:0;max-height:280px;overflow-y:auto;padding:4px 0;margin-bottom:10px}
.note-msg{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.note-msg:last-child{border:none}
.note-avatar{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.note-body{flex:1}
.note-header{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.note-author{font-size:.79rem;font-weight:700;color:var(--text)}
.note-role-txt{font-size:.65rem;color:var(--text3)}
.note-time{font-size:.65rem;color:var(--text3);margin-left:auto}
.note-text{font-size:.81rem;color:var(--text2);line-height:1.5;word-break:break-word;background:rgba(255,255,255,.03);border-radius:7px;padding:7px 10px}
.note-input-wrap{display:flex;gap:8px;margin-top:6px}
.note-input{flex:1;padding:9px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.83rem;outline:none;transition:border .2s;resize:none;min-height:38px;max-height:90px;line-height:1.4}
.note-input:focus{border-color:var(--primary)}
.note-send-btn{padding:9px 14px;background:var(--primary);border:none;border-radius:9px;color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .18s;flex-shrink:0;display:flex;align-items:center;gap:5px}
.note-send-btn:hover{opacity:.88}

/* WA */
.wa-panel{background:rgba(37,211,102,.06);border:1px solid rgba(37,211,102,.2);border-radius:10px;padding:14px;margin-top:10px}
.wa-panel-title{font-size:.75rem;color:var(--wa);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.wa-msg-preview{font-size:.78rem;color:var(--text2);background:rgba(255,255,255,.03);border-radius:8px;padding:10px;line-height:1.6;white-space:pre-wrap;margin-bottom:10px;border:1px solid rgba(255,255,255,.05);max-height:120px;overflow-y:auto}
.wa-btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* EXPENSE */
.expense-cat{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.67rem;font-weight:700}

/* DASHBOARD MINI CARDS */
.dash-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.mini-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:transform .2s,border-color .2s;display:flex;align-items:center;gap:14px}
.mini-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.12)}
.mini-card .mc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.mini-card .mc-body{flex:1;min-width:0}
.mini-card .mc-num{font-size:1.4rem;font-weight:800;color:#fff;line-height:1;margin-bottom:4px}
.mini-card .mc-label{font-size:.72rem;color:var(--text3);font-weight:500}

/* SCAN CHOICE MODAL */
.scan-choice{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.scan-choice-btn{padding:20px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.scan-choice-btn:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);transform:translateY(-2px)}
.scan-choice-btn .scb-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin:0 auto 10px}
.scan-choice-btn .scb-title{font-size:.88rem;font-weight:700;color:#fff;margin-bottom:4px}
.scan-choice-btn .scb-sub{font-size:.72rem;color:var(--text3);line-height:1.4}
.scan-section{display:none}
.scan-section.active{display:block;animation:mIn .2s}
.perm-section-title{grid-column:1/-1;font-size:.65rem;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;margin-top:10px;margin-bottom:2px;font-weight:700}

/* STAFF CARD */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color .2s}
.staff-card:hover{border-color:rgba(255,255,255,.12)}
.sc-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.sc-avatar{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:1.1rem;flex-shrink:0}
.sc-name{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:3px}
.sc-info{font-size:.72rem;color:var(--text3)}
.sc-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc-stat{background:rgba(255,255,255,.03);border-radius:8px;padding:8px 10px}
.sc-stat-num{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:1px}
.sc-stat-label{font-size:.67rem;color:var(--text3)}

/* TOAST */
.toast-box{position:fixed;top:70px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:320px;pointer-events:none}
.toast{padding:12px 16px;border-radius:10px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--green);display:flex;align-items:center;gap:10px;font-size:.82rem;animation:slideIn .28s;box-shadow:0 4px 16px rgba(0,0,0,.35);pointer-events:all}
.toast.error{border-left-color:var(--red)}
.toast i{font-size:.85rem;flex-shrink:0}
.toast.success i{color:var(--green)}
.toast.error i{color:var(--red)}

/* SCANNER */
.scan-panel{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.2);border-radius:10px;padding:16px;margin-top:10px}
.scan-title{font-size:.75rem;color:var(--cyan);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
#scanVideo{width:100%;border-radius:8px;background:#000;max-height:220px;object-fit:cover;display:none}
#scanCanvas{display:none}


/* PAYMENT METHOD — полная система */
.pay-method-wrap{display:none;margin-top:10px;animation:mIn .2s}
.pay-method-wrap.show{display:block}
.pm-label{font-size:.73rem;color:var(--text2);font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.pay-method-row{display:flex;gap:8px;flex-wrap:wrap}
.pay-method-btn{padding:8px 16px;border-radius:9px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text2);font-size:.8rem;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:6px}
.pay-method-btn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);transform:translateY(-1px)}
.pay-method-btn.selected{border-color:rgba(16,185,129,.5);font-weight:600}
.pm-cash.selected{background:rgba(16,185,129,.13);color:var(--green)}
.pm-bank.selected{background:rgba(59,130,246,.13);color:var(--blue)}
.pm-transfer.selected{background:rgba(139,92,246,.13);color:var(--purple)}

/* PAYMENT BADGE — компактные теги везде в системе */
.pm-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:.67rem;font-weight:700;white-space:nowrap}
.pm-badge.cash{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.pm-badge.bank{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.pm-badge.transfer{background:rgba(139,92,246,.15);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.pm-badge.mixed{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3)}

/* ИСТОРИЯ ПЛАТЕЖЕЙ */
.payment-history{margin-top:10px}
.ph-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;font-size:.82rem}
.ph-item:last-child{margin-bottom:0}
.ph-amount{font-weight:700;color:var(--green);min-width:70px}
.ph-meta{color:var(--text3);font-size:.72rem;flex:1}
.ph-del{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:var(--red-dim);color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.68rem;transition:all .18s}
.ph-del:hover{background:var(--red);color:#fff}

/* ADD PAYMENT кнопка в заказе */
.add-payment-btn{width:100%;padding:11px;background:rgba(16,185,129,.06);border:1.5px dashed rgba(16,185,129,.3);border-radius:9px;color:var(--green);font-size:.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;margin-top:8px;font-family:inherit}
.add-payment-btn:hover{background:rgba(16,185,129,.1);border-color:var(--green)}

/* ФИНАНСОВАЯ СТРОКА В ТАБЛИЦЕ */
.fin-row-inline{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center}
.fib{font-size:.7rem;padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.fib-total{background:rgba(245,158,11,.12);color:var(--gold);border:1px solid rgba(245,158,11,.2)}
.fib-paid{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.fib-debt{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.fib-done{background:rgba(16,185,129,.18);color:var(--green);border:1px solid rgba(16,185,129,.35)}
.fib-rusum{background:rgba(249,115,22,.12);color:var(--orange);border:1px solid rgba(249,115,22,.2)}


/* RESPONSIVE */
@media(max-width:900px){
  :root{--sidebar-w:60px}
  .sb-brand-text,.sb-uname,.sb-urole,.logout-btn span{display:none}
  .nav-item{justify-content:center;padding:10px}
  .nav-item .nav-icon{width:34px;height:34px}
  .main-area{padding:14px;padding-top:70px}
  .stats-grid{grid-template-columns:repeat(2,1fr)!important}
  .form-grid,.form-grid3{grid-template-columns:1fr}
  .services-grid,.perm-grid{grid-template-columns:1fr}
  .topbar{left:60px}
  .table-head,.table-row{min-width:680px}
}

.sidebar-backdrop{display:none}

@media(max-width:768px){
  :root{--sidebar-w:0px}
  .sidebar{transform:translateX(-100%);width:min(84vw,280px);z-index:130;transition:transform .22s ease}
  body.mobile-nav-open .sidebar{transform:translateX(0)}
  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(1px);opacity:0;pointer-events:none;transition:opacity .2s;z-index:120}
  body.mobile-nav-open .sidebar-backdrop{opacity:1;pointer-events:auto}
  .topbar{left:0;height:54px;padding:0 10px;gap:8px}
  .mob-menu-btn{display:inline-flex}
  .global-search-wrap{max-width:none}
  .main-area{margin-left:0;padding:12px;padding-top:66px}
  .page-head h2{font-size:1.08rem}
  .search-input-wrap{min-width:0}
  .stats-grid{grid-template-columns:1fr!important}
  .fin-cards-row,.fin-pay-strip,.dash-row,.scan-choice{grid-template-columns:1fr!important}
  .money-grid{grid-template-columns:1fr}
  .finance-toolbar,.search-bar{gap:8px}
  .search-bar .form-select,.search-bar .form-input,.search-bar input[type="month"]{width:100%!important;max-width:none!important}
  .modal{padding:16px;max-height:88vh;overflow:auto}
  .toast-box{top:58px;right:10px;left:10px;max-width:none}
}

@keyframes mIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}

// ── Köməkçi: server sorğusu ───────────────────────────────────────────────
async function _apiFetch(action, key, body) {
  const url = `${_API_URL}?action=${action}&key=${key||''}&token=${_API_TOKEN}`;
  const opts = body !== undefined
    ? { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }
    : { method:'GET' };
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function _readLocal(k) {
  const raw = localStorage.getItem('bynt10_'+k) || localStorage.getItem('azd9_'+k);
  if (!raw) return [];
  try {
    const data = JSON.parse(raw);
    return Array.isArray(data) ? data : [];
  } catch {
    return [];
  }
}

function _normalizeApiData(d) {
  if (Array.isArray(d)) return d;
  if (Array.isArray(d?.data)) return d.data;
  if (typeof d?.data === 'string') {
    try {
      const parsed = JSON.parse(d.data);
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      return [];
    }
  }
  return [];
}

// ── DB obyekti ─────────────────────────────────────────────────────────────
const DB = {

  // Sinxron cache oxuma
  get: k => {
    if (Array.isArray(_cache[k])) return _cache[k];
    _cache[k] = _readLocal(k);
    return _cache[k];
  },

  // Saxla: server + cache + localStorage
  set: async (k, d) => {
    _cache[k] = d;
    _dirtyUntil[k] = Date.now() + 120000; // prevent poll overwrite while write is in-flight
    _safeLocalSet('bynt10_'+k, JSON.stringify(d));
    window.dispatchEvent(new CustomEvent('db_'+k));
    if (!_REMOTE_KEYS.has(k)) return;
    _queuedWrites[k] = _cloneData(d);
    if (_writeTimers[k]) clearTimeout(_writeTimers[k]);
    _writeTimers[k] = setTimeout(() => { DB._commitKey(k); }, 350);
  },

  _commitKey: async (k) => {
    if (_writeLocks[k]) return;
    if (!_REMOTE_KEYS.has(k)) return;
    const payload = _queuedWrites[k];
    if (payload === undefined) return;
    _writeLocks[k] = true;
    delete _queuedWrites[k];
    try {
      if (_apiOnline) {
        const res = await _apiFetch('set', k, payload);
        if (res?.ok) {
          delete _pendingWrites[k];
          _savePendingWrites();
          _dirtyUntil[k] = Date.now() + 5000; // after confirmed write, shorter dirty
        } else {
          throw new Error(res?.error || 'API write rejected');
        }
      } else {
        throw new Error('API offline');
      }
    } catch(e) {
      console.warn('API write error:', e.message);
      // Keep local state as source of truth until server accepts retry.
      _dirtyUntil[k] = Date.now() + 24 * 60 * 60 * 1000;
      _pendingWrites[k] = _cloneData(payload);
      _savePendingWrites();
    } finally {
      _writeLocks[k] = false;
      if (_queuedWrites[k] !== undefined) DB._commitKey(k);
    }
  },

  // Abunəlik: dərhal cache-dən göstər, sonra serverdən yüklə + 5s polling
  sub: (k, cb) => {
    // Dərhal cache-dən göstər
    const cached = localStorage.getItem('bynt10_'+k);
    if (cached) try { _cache[k] = JSON.parse(cached); cb(_cache[k]); } catch {}

    // Serverdən yüklə
    const _load = async () => {
      try {
        if (_pendingWrites[k]) return; // never overwrite unsynced local edits
        if (_dirtyUntil[k] && Date.now() < _dirtyUntil[k]) return;
        const d = _normalizeApiData(await _apiFetch('get', k));
        if (_pendingWrites[k]) return; // pending write could appear while fetch was in-flight
        _cache[k] = d;
        _safeLocalSet('bynt10_'+k, JSON.stringify(d));
        cb(d);
      } catch(e) {
        console.warn('API read error:', e.message);
        if (_cache[k]) cb(_cache[k]);
      }
    };

    _load();

    // 5 saniyəlik polling (cihazlar arası sinxronizasiya)
    if (_polls[k]) clearInterval(_polls[k]);
    _polls[k] = setInterval(_load, 5000);

    // Abunəlikdən çıxma funksiyası
    return () => { clearInterval(_polls[k]); delete _polls[k]; };
  },

  // Serverlə bağlantı yoxlaması + init
  init: async () => {
    const _showBanner = (msg) => {
      let el = document.getElementById('fbStatus');
      if (!el) {
        el = document.createElement('div');
        el.id = 'fbStatus';
        el.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#b91c1c;color:#fff;padding:8px 18px;border-radius:8px;font-size:.78rem;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.4);';
        document.body.appendChild(el);
      }
      el.innerHTML = msg;
    };

    try {
      const res = await _apiFetch('ping', '');
      if (res.ok) {
        _apiOnline = true;
        console.log('✅ PHP API qoşuldu — çox cihazlı sinxronizasiya aktiv');
        document.getElementById('fbStatus')?.remove();
        // LocalStorage-dəki köhnə datanı serverə yüklə
        await DB._syncLocalToServer();
      } else { throw new Error('ping failed'); }
    } catch(e) {
      _apiOnline = false;
      console.warn('⚠️ API offline:', e.message);
      _showBanner('⚠️ Server bağlantısı yoxdur — yalnız bu cihazda saxlanılır');
    }

    // Permanent reconnect + pending write retry loop
    if (!_retryTimer) {
      _retryTimer = setInterval(async () => {
        try {
          if (!_apiOnline) {
            const ping = await _apiFetch('ping', '');
            if (!ping?.ok) throw new Error('ping failed');
            _apiOnline = true;
            document.getElementById('fbStatus')?.remove();
          }
          if (Object.keys(_pendingWrites).length) {
            await DB._flushPendingWrites();
          }
        } catch {
          _apiOnline = false;
        }
      }, 8000);
    }
  },

  // Pending yazmaları və local datanı serverə yüklə
  _syncLocalToServer: async () => {
    const keys = ['orders','trans','staff','expenses','logs','boot'];
    // First flush any pending writes
    for (const k of Object.keys(_pendingWrites)) {
      if (!_REMOTE_KEYS.has(k)) { delete _pendingWrites[k]; continue; }
      try {
        await _apiFetch('set', k, _pendingWrites[k]);
        delete _pendingWrites[k];
        console.log(`✅ Pending write flushed: ${k}`);
      } catch(e) { console.warn(`Pending flush ${k} error:`, e.message); }
    }
    _savePendingWrites();
    // Then sync local → server if server is empty
    for (const k of keys) {
      const raw = localStorage.getItem('bynt10_'+k) || localStorage.getItem('azd9_'+k);
      if (!raw) continue;
      try {
        const local = JSON.parse(raw);
        if (!Array.isArray(local) || local.length === 0) continue;
        const server = _normalizeApiData(await _apiFetch('get', k));
        if (!Array.isArray(server) || server.length === 0) {
          await _apiFetch('set', k, local);
          console.log(`✅ Sinxronizasiya: ${k} (${local.length} qeyd) serverə yükləndi`);
        }
      } catch(e) { console.warn(`Sync ${k} error:`, e.message); }
    }
  }
  ,
  _flushPendingWrites: async () => {
    const keys = Object.keys(_pendingWrites);
    for (const k of keys) {
      if (!_REMOTE_KEYS.has(k)) { delete _pendingWrites[k]; continue; }
      try {
        const payload = _pendingWrites[k];
        const res = await _apiFetch('set', k, payload);
        if (res?.ok) {
          delete _pendingWrites[k];
          _dirtyUntil[k] = Date.now() + 5000;
        }
      } catch (e) {
        console.warn(`Pending flush ${k} error:`, e.message);
      }
    }
    _savePendingWrites();
  }
};

  list.forEach(o=>{
    const num=v=>Number.isFinite(+v)?+v:0;
    const payCurrencies=[...new Set((o.payments||[]).map(p=>p.currency).filter(Boolean))];
    if((!o.currency||o.currency==='azn')&&payCurrencies.length===1&&payCurrencies[0]!=='azn'){
      o.currency=payCurrencies[0];
      changed=true;
    }
    if(!o.currency){o.currency='azn';changed=true}
    if(!o.payments){
      o.payments=o.paidAmount>0
        ?[{id:uid('PAY'),amount:o.paidAmount,method:o.payMethod||null,currency:o.currency||'azn',date:o.createdAt||Date.now(),paymentDate:o.createdAt||Date.now(),who:o.createdByName||'—',type:'prepayment'}]
        :[];
      changed=true;
    }
    (o.payments||[]).forEach(p=>{
      p.amount=num(p.amount);
      if(!p.currency){p.currency=o.currency||'azn';changed=true}
      if(!p.paymentDate){p.paymentDate=p.date||o.createdAt||Date.now();changed=true}
    });
    if(o.totalPrice===undefined||!Number.isFinite(+o.totalPrice)){o.totalPrice=num(o.totalPrice);changed=true}
    // Duty (rusum) payments migration
    if(!o.dutyPayments){
      const rusum=o.rusum||0;
      const dutyPaid=o.dutyPaid||0;
      if(rusum>0&&dutyPaid>0){
        o.dutyPayments=[{id:uid('DPY'),amount:dutyPaid,method:o.payMethod||null,currency:o.currency||'azn',date:o.createdAt||Date.now(),paymentDate:o.createdAt||Date.now(),who:o.createdByName||'—'}];
      } else if(rusum>0&&!o.dutyPaid){
        // Old orders: assume rusum was fully paid at creation
        o.dutyPayments=[{id:uid('DPY'),amount:rusum,method:o.payMethod||null,currency:o.currency||'azn',date:o.createdAt||Date.now(),paymentDate:o.createdAt||Date.now(),who:o.createdByName||'—'}];
        o.dutyPaid=rusum;
        o.dutyDebt=0;
      } else {
        o.dutyPayments=[];
      }
      changed=true;
    }
    if(o.rusum>0&&o.dutyPaid===undefined){
      o.dutyPaid=(o.dutyPayments||[]).reduce((s,p)=>s+(p.amount||0),0);
      o.dutyDebt=Math.max(0,(o.rusum||0)-o.dutyPaid);
      changed=true;
    }
    (o.dutyPayments||[]).forEach(p=>{
      p.amount=num(p.amount);
      if(!p.currency){p.currency=o.currency||'azn';changed=true}
      if(!p.paymentDate){p.paymentDate=p.date||o.createdAt||Date.now();changed=true}
    });
    const total=num(o.totalPrice);
    const paidByHistory=(o.payments||[]).reduce((s,p)=>s+num(p.amount),0);
    const rusum=num(o.rusum);
    const dutyPaidByHistory=(o.dutyPayments||[]).reduce((s,p)=>s+num(p.amount),0);
    const nextPaid=Math.max(0,paidByHistory);
    const nextDebt=Math.max(0,total-nextPaid);
    const nextDutyPaid=Math.max(0,dutyPaidByHistory);
    const nextDutyDebt=Math.max(0,rusum-nextDutyPaid);
    if(Math.abs(num(o.paidAmount)-nextPaid)>0.0001){o.paidAmount=nextPaid;changed=true}
    if(Math.abs(num(o.debtAmount)-nextDebt)>0.0001){o.debtAmount=nextDebt;changed=true}
    if(Math.abs(num(o.dutyPaid)-nextDutyPaid)>0.0001){o.dutyPaid=nextDutyPaid;changed=true}
    if(Math.abs(num(o.dutyDebt)-nextDutyDebt)>0.0001){o.dutyDebt=nextDutyDebt;changed=true}
    const nextNetIncome=Math.max(0,total-rusum);
    if(Math.abs(num(o.netIncome)-nextNetIncome)>0.0001){o.netIncome=nextNetIncome;changed=true}
  });
  return{list,changed};
}

function migrateExpenses(list){
  let changed=false;
  list.forEach(e=>{if(!e.currency){e.currency='azn';changed=true}});
  return{list,changed};
}

let _gsTimer=null;
window.globalSearch=()=>{
  clearTimeout(_gsTimer);
  _gsTimer=setTimeout(()=>{
    const q=(document.getElementById('globalSearch')?.value||'').trim().toLowerCase();
    const res=document.getElementById('gsResults');
    if(!res)return;
    if(!q||q.length<2){res.classList.remove('open');res.innerHTML='';return}
    const results=[];
    // Поиск по заказам
    orders.filter(o=>[o.id,o.name,o.surname,o.phone,o.passport,o.svcType,o.status,...(o.selectedServices||[])].join(' ').toLowerCase().includes(q))
      .slice(0,5).forEach(o=>results.push({type:'order',item:o,label:o.name+' '+o.surname,sub:o.id+' · '+(o.selectedServices||[]).join(', ')+' · '+money(o.totalPrice,o.currency),badge:o.office}));
    // Поиск по переводам
    trans.filter(t=>[t.id,t.clientName,t.clientPhone,t.langFrom,t.langTo].join(' ').toLowerCase().includes(q))
      .slice(0,3).forEach(t=>results.push({type:'trans',item:t,label:t.clientName,sub:t.id+' · '+langName(t.langFrom)+' → '+langName(t.langTo),badge:null}));
    // Поиск по сотрудникам
    if(can('manage_users'))staff.filter(s=>[s.name,s.surname,s.username,s.phone].join(' ').toLowerCase().includes(q))
      .slice(0,3).forEach(s=>results.push({type:'staff',item:s,label:s.name+' '+s.surname,sub:ROLES_LIST.find(r=>r.id===s.role)?.name||s.role,badge:s.office}));

    if(!results.length){res.innerHTML=`<div class="gs-empty"><i class="fas fa-search" style="margin-right:6px;opacity:.4"></i>"${esc(q)}" tapılmadı</div>`;res.classList.add('open');return}
    res.innerHTML=results.map(r=>`
    <div class="gs-item" onclick="gsClick('${r.type}','${eA(r.item.id)}')">
      <div class="gs-item-name">${esc(r.label)} ${r.badge?officeBadge(r.badge):''}</div>
      <div class="gs-item-meta"><span class="gs-item-id">${r.type==='order'?'📋':r.type==='trans'?'🌐':'👤'}</span> ${esc(r.sub)}</div>
    </div>`).join('');
    res.classList.add('open');
  },180);
};
window.gsClick=(type,id)=>{
  closeGS();document.getElementById('globalSearch').value='';
  if(type==='order')viewOrder(id);
  else if(type==='trans')viewTrans(id);
  else{render('users');}
};
window.closeGS=()=>document.getElementById('gsResults')?.classList.remove('open');

const isPhoneViewport=()=>window.matchMedia('(max-width: 768px)').matches;
function closeMobileNav(){document.body.classList.remove('mobile-nav-open')}
function setupMobileNav(){
  const btn=document.getElementById('mobMenuBtn');
  const backdrop=document.getElementById('sidebarBackdrop');
  const nav=document.getElementById('sidebarNav');
  if(!btn||!backdrop||!nav)return;
  btn.addEventListener('click',()=>document.body.classList.toggle('mobile-nav-open'));
  backdrop.addEventListener('click',closeMobileNav);
  nav.addEventListener('click',e=>{if(isPhoneViewport()&&e.target.closest('.nav-item'))closeMobileNav()});
  window.addEventListener('resize',()=>{if(!isPhoneViewport())closeMobileNav()});
  window.addEventListener('keydown',e=>{if(e.key==='Escape')closeMobileNav()});
}
setupMobileNav();

window.doLogin=()=>{
  const u=document.getElementById('lu')?.value.trim(),p=document.getElementById('lp')?.value;
  const user=staff.find(e=>e.username===u&&e.password===p&&e.active);
  if(!user){toast('İstifadəçi adı və ya şifrə yanlışdır',1);return}
  me=user;myRole=user.role;
  // БАГ 15 FIX: сохраняем сессию в sessionStorage (переживает навигацию, но не закрытие вкладки)
  try{sessionStorage.setItem('azd_session',JSON.stringify({id:user.id,username:user.username,role:user.role}))}catch{}
  logAct('login','user',{username:u});
  document.getElementById('appRoot').innerHTML='';
  document.getElementById('app').style.display='block';
  document.getElementById('userAvatar').textContent=(user.name||'?')[0].toUpperCase();
  document.getElementById('userName').textContent=user.name+(user.surname?' '+user.surname:'');
  document.getElementById('userRole').textContent=ROLES_LIST.find(r=>r.id===myRole)?.name||myRole;
  buildSidebar();render('dashboard');
  toast(`Xoş gəldiniz, ${user.name}! ${officeBadge(user.office)} — BY.NT`);
};
window.doLogout=()=>{
  if(!confirm('Çıxmaq?'))return;
  stopScanner();
  logAct('logout','user',{});
  try{sessionStorage.removeItem('azd_session')}catch{}
  me=null;myRole='';
  document.getElementById('app').style.display='none';
  showLogin();
};

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function buildSidebar(){
  const newT=trans.filter(t=>t.status==='new').length;
  let h='<div class="nav-section">Menyu</div>';
  const add=(p,icon,label,badge='')=>{h+=`<button class="nav-item" id="nav_${p}" onclick="render('${p}')"><div class="nav-icon"><i class="fas ${icon}"></i></div><span>${label}</span>${badge?`<span class="nav-badge">${badge}</span>`:''}</button>`};
  if(myRole==='translator'){
    add('translations','fa-language','Mənim Tərcümələrim',newT||'');
    add('profile','fa-circle-user','Profil');
  } else {
    add('dashboard','fa-house','Panel');
    if(can('view_orders'))     add('services','fa-briefcase','Xidmətlər');
    if(can('view_orders'))     add('debtors','fa-user-clock','Borclular');
    if(can('view_translations'))add('translations','fa-language','Tərcümələr',newT||'');
    if(can('view_expenses'))   add('expenses','fa-wallet','Xərclər');
    if(can('view_finance'))    add('finance','fa-chart-pie','Maliyyə');
    if(can('view_staff_stats'))add('staff_stats','fa-chart-bar','İşçi Stat.');
    if(can('manage_users'))    add('users','fa-users-gear','İşçilər');
    add('logs','fa-clock-rotate-left','Tarixçə');
    add('profile','fa-circle-user','Profil');
    if(can('scan_docs'))add('__scan','fa-camera','Skan');
  }
  document.getElementById('sidebarNav').innerHTML=h;
  // БАГ 16: показываем офис пользователя в sidebar (admin = Qlobal)
  const offLabel=document.getElementById('officeLabel');
  if(offLabel){
    if(myRole==='admin')offLabel.textContent='Admin · Qlobal';
    else{const o=OFFICES.find(x=>x.id===me?.office);offLabel.textContent=o?o.flag+' '+o.name:'CRM v10.0'}
  }
}

window.render=function(p){
  page=p;const m=document.getElementById('mainContent');if(!m)return;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav_'+p)?.classList.add('active');
  if(p==='dashboard')    renderDashboard(m);
  else if(p==='__scan')       {openScanner(null);render('dashboard');return}
  else if(p==='services')     renderServices(m);
  else if(p==='debtors')      renderDebtors(m);
  else if(p==='translations') renderTranslations(m);
  else if(p==='expenses')     renderExpenses(m);
  else if(p==='finance')      renderFinance(m);
  else if(p==='staff_stats')  renderStaffStats(m);
  else if(p==='users')        renderUsers(m);
  else if(p==='logs')         renderLogs(m);
  else if(p==='profile')      renderProfile(m);
};

// ─── DASHBOARD ─── упрощённый: мини-карточки + таблица последних заказов ──────
function renderDashboard(m){
  // Dashboard показывает только доступные заказы
  const visibleOrders=orders.filter(o=>canViewOffice(o.office));
  const totOrders=visibleOrders.length;
  const newT=trans.filter(t=>t.status==='new'&&canViewOffice(t.office)).length;
  const newOrders=visibleOrders.filter(o=>o.status==='new').length;
  const activeOrders=visibleOrders.filter(o=>['in_work'].includes(o.status)).length;

  m.innerHTML=`
  <div class="page-head"><h2><div class="ph-icon"><i class="fas fa-house"></i></div> Panel</h2>
    <div style="display:flex;gap:8px">
      ${can('scan_docs')?`<button class="btn btn-scan" onclick="openScanner(null)"><i class="fas fa-camera"></i> Skan</button>`:''}
      ${can('create_orders')?`<button class="btn btn-primary" onclick="openCreateOrder()"><i class="fas fa-plus"></i> Yeni sifariş</button>`:''}
    </div>
  </div>

window.liveSearchOrders=()=>{
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(()=>{
    const q=(document.getElementById('svcSearch')?.value||'').toLowerCase().trim();
    const st=document.getElementById('svcStatusFilter')?.value||'';
    const of=document.getElementById('svcOfficeFilter')?.value||'';
    const pm=document.getElementById('svcPayFilter')?.value||'';
    const dateFrom=document.getElementById('svcDateFrom')?.value||'';
    const dateTo=document.getElementById('svcDateTo')?.value||'';
    const debtOnly=document.getElementById('svcDebtFilter')?.checked||false;
    const dutyDebtOnly=document.getElementById('svcDutyDebtFilter')?.checked||false;
    _svcFilters={q,office:of,status:st,pay:pm,dateFrom,dateTo,debtOnly,dutyDebtOnly};
    let list=orders.filter(o=>canViewOffice(o.office));
    if(st)list=list.filter(o=>o.status===st);
    if(of)list=list.filter(o=>o.office===of);
    if(pm==='none')list=list.filter(o=>!o.paidAmount||o.paidAmount===0);
    else if(pm==='mixed')list=list.filter(o=>o.payMethod==='mixed'||((o.payments||[]).length>1));
    else if(pm)list=list.filter(o=>o.payMethod===pm||(o.payments||[]).some(p=>p.method===pm));
    if(dateFrom){const df=dateFrom;list=list.filter(o=>{const d=dateToDay(o.createdAt);return d>=df})}
    if(dateTo){const dt=dateTo;list=list.filter(o=>{const d=dateToDay(o.createdAt);return d<=dt})}
    if(debtOnly)list=list.filter(o=>(o.debtAmount||0)>0);
    if(dutyDebtOnly)list=list.filter(o=>(o.dutyDebt||0)>0);
    if(q)list=list.filter(o=>[
      o.id,o.name,o.surname,o.phone,o.passport,o.svcType,
      ...(o.selectedServices||[]),
      o.payMethod?PAY_LABEL(o.payMethod):'',
      ...(o.payments||[]).map(p=>PAY_LABEL(p.method))
    ].join(' ').toLowerCase().includes(q));
    const wrap=document.getElementById('ordersTableWrap');
    if(wrap)wrap.innerHTML=list.length?renderOrdersTable(list):`<div class="empty-state"><div class="empty-icon"><i class="fas fa-magnifying-glass"></i></div><p>"${esc(q||'filtr')}" tapılmadı</p></div>`;
    const visibleTotal=orders.filter(o=>canViewOffice(o.office)).length;
    const cnt=document.getElementById('svcCount');if(cnt)cnt.textContent=`(${list.length}${list.length!==visibleTotal?'/'+visibleTotal:''})`;
  },180);
};

// Функция финансовой мини-строки для таблицы
function finRowInline(o){
  const total=o.totalPrice||0;
  const paid=o.paidAmount||0;
  const debt=o.debtAmount||0;
  const rusum=o.rusum||0;
  const sym=CURR_SYM(o.currency||'azn');
  if(total===0)return'';
  const isFullyPaid=debt<=0;
  const payments=o.payments||[];
  const uniqueMethods=[...new Set(payments.map(p=>p.method).filter(Boolean))];
  const pmBadge=uniqueMethods.length>1
    ?`<span class="pm-badge mixed"><i class="fas fa-shuffle"></i>Qarışıq</span>`
    :o.payMethod?PAY_BADGE(o.payMethod):'';
  return`<div style="line-height:1.8">
    <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
      <span class="fib fib-total">${total.toFixed(0)}<span style="font-size:.6rem;opacity:.8">${sym}</span></span>
      ${o.currency&&o.currency!=='azn'?CURR_BADGE(o.currency):''}
    </div>
    <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:3px">
      ${paid>0?`<span class="fib fib-paid">✓${paid.toFixed(0)}${sym}</span>`:''}
      ${pmBadge}
    </div>
    ${rusum>0?`<div style="margin-top:3px;display:flex;align-items:center;gap:4px;flex-wrap:wrap"><span class="fib fib-rusum"><i class="fas fa-receipt" style="font-size:.55rem;margin-right:2px"></i>${rusum.toFixed(0)}${sym}</span>${(o.dutyDebt||0)>0?`<span class="fib fib-debt" style="font-size:.6rem">⏳${(o.dutyDebt||0).toFixed(0)}${sym}</span>`:`<span class="fib fib-done" style="font-size:.6rem">✅</span>`}</div>`:''}
    ${isFullyPaid
      ?`<span class="fib fib-done" style="margin-top:3px;display:inline-flex">✅ Ödənildi</span>`
      :(debt>0?`<span class="fib fib-debt" style="margin-top:3px;display:inline-flex">⏳${debt.toFixed(0)}${sym}</span>`:'')}
  </div>`;
}

// ─── FILE HELPERS ─────────────────────────────────────────────────────────────
function fileIconCls(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  if(ext==='pdf')return{cls:'fi-pdf',icon:'fa-file-pdf'};
  if(['doc','docx'].includes(ext))return{cls:'fi-doc',icon:'fa-file-word'};
  if(['jpg','jpeg','png','gif'].includes(ext))return{cls:'fi-img',icon:'fa-file-image'};
  if(['zip','rar'].includes(ext))return{cls:'fi-zip',icon:'fa-file-zipper'};
  if(['xlsx','xls'].includes(ext))return{cls:'fi-xls',icon:'fa-file-excel'};
  return{cls:'fi-other',icon:'fa-file'};
}
function renderFileItem(f,i,scope,sid,canDel){
  const ic=fileIconCls(f.name);
  const canDl=can('download_files');
  const canPrev=can('preview_files');
  const isImg=f.type&&f.type.startsWith('image/');
  return`<div class="file-item">
    <div class="fi-icon ${ic.cls}"><i class="fas ${ic.icon}"></i></div>
    <div class="fi-body">
      <div class="fi-name">${esc(f.name)}</div>
      <div class="fi-meta">${fmtBytes(f.size||0)} · ${esc(f.uploadedBy||'—')} · ${f.uploadedAt?fmtDate(f.uploadedAt):'—'}</div>
      ${canPrev&&isImg&&f.data?`<img src="${f.data}" style="max-width:180px;max-height:80px;border-radius:5px;margin-top:6px;object-fit:cover;border:1px solid var(--border)" alt="preview">`:'' }
    </div>
    <div class="fi-actions">
      ${canDl?`<button class="fi-btn dl" title="Endir" onclick="dlFile('${eA(sid)}','${i}','${scope}')"><i class="fas fa-download"></i></button>`:''}
      ${canDel?`<button class="fi-btn rm" title="Sil" onclick="rmFile('${eA(sid)}','${i}','${scope}')"><i class="fas fa-trash"></i></button>`:''}
    </div>
  </div>`;
}
function renderFileList(files,scope,sid,canDel=true){
  if(!files?.length)return`<div style="text-align:center;padding:10px;color:var(--text3);font-size:.8rem">Fayl yoxdur</div>`;
  return files.map((f,i)=>renderFileItem(f,i,scope,sid,canDel)).join('');
}
function renderTempFileItems(){return _tempFiles.map((f,i)=>renderFileItem(f,i,'temp','temp',true)).join('')||''}
function renderTempDropZone(){
  return`<div class="file-drop-zone" ondragover="event.preventDefault();this.classList.add('dragging')" ondragleave="this.classList.remove('dragging')" ondrop="handleTempDrop(event)"><input type="file" multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.zip,.xlsx,.xls" onchange="handleTempInput(event)"><div class="fdz-icon"><i class="fas fa-cloud-arrow-up"></i></div><div class="fdz-text">Faylları sürükləyin və ya klikləyin</div><div class="fdz-sub">Maks. 50 MB · Telefonda kamera/qalereya</div><div class="fdz-formats"><span class="fdz-fmt">PDF</span><span class="fdz-fmt">DOC</span><span class="fdz-fmt">JPG</span><span class="fdz-fmt">ZIP</span><span class="fdz-fmt">Excel</span></div></div><div class="file-list" id="tempFileList">${renderTempFileItems()}</div>`;
}
function renderOrderDropZone(oid,files){
  return`<div class="file-drop-zone" style="padding:16px" ondragover="event.preventDefault();this.classList.add('dragging')" ondragleave="this.classList.remove('dragging')" ondrop="handleOrderDrop(event,'${eA(oid)}')"><input type="file" multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.zip,.xlsx,.xls" onchange="handleOrderInput(event,'${eA(oid)}')"><div class="fdz-icon" style="width:36px;height:36px;font-size:.9rem"><i class="fas fa-plus"></i></div><div class="fdz-text" style="font-size:.82rem">Fayl əlavə et · drag & drop</div><div class="fdz-sub">maks 50 MB hər fayl</div></div><div class="file-list" id="orderFileList_${oid}">${renderFileList(files,'order',oid,can('delete_files'))}</div>`;

window.handleTempInput=e=>{processFiles([...e.target.files],'temp');e.target.value=''};
window.handleTempDrop=e=>{e.preventDefault();document.querySelectorAll('.file-drop-zone').forEach(z=>z.classList.remove('dragging'));processFiles([...e.dataTransfer.files],'temp')};
window.handleOrderInput=(e,oid)=>{processFiles([...e.target.files],'order',oid);e.target.value=''};
window.handleOrderDrop=(e,oid)=>{e.preventDefault();processFiles([...e.dataTransfer.files],'order',oid)};
window.handleTransInput=(e,tid)=>{processFiles([...e.target.files],'trans',tid);e.target.value=''};
window.handleTransDrop=(e,tid)=>{e.preventDefault();processFiles([...e.dataTransfer.files],'trans',tid)};

// LocalStorage лимит: для файлов >2MB используем chunked подход
function processFiles(files,scope,sid=''){
  if(scope!=='temp'&&!can('upload_files')){toast('Fayl yükləmə icazəniz yoxdur',1);return}
  files.forEach(file=>{
    if(file.size>FILE_MAX_BYTES){toast(`${file.name}: ${fmtBytes(file.size)} — maks. 50 MB`,1);return}
    // Предупреждение для больших файлов (LocalStorage ограничен ~5MB total)
    if(file.size>2*1024*1024){
      toast(`⚠️ ${file.name} (${fmtBytes(file.size)}): LocalStorage-da böyük fayl — server versiyasında problem olmayacaq`,0);
    }
    const reader=new FileReader();
    reader.onload=ev=>{
      const fd={name:file.name,size:file.size,type:file.type,data:ev.target.result,uploadedBy:me.name,uploadedAt:Date.now(),uploadedById:me.id};
      try{
        if(scope==='temp'){
          _tempFiles.push(fd);
          const fl=document.getElementById('tempFileList');if(fl)fl.innerHTML=renderTempFileItems();
          toast(`✅ ${file.name}`);
        } else if(scope==='order'){
          const all=DB.get('orders');const o=all.find(x=>x.id===sid);if(!o)return;
          (o.files=o.files||[]).push(fd);DB.set('orders',all);
          if(o.hasTercume){const ta=DB.get('trans');const t=ta.find(x=>x.orderId===sid);if(t){(t.files=t.files||[]).push({...fd,fromOrder:true});DB.set('trans',ta)}}
          const fl=document.getElementById(`orderFileList_${sid}`);if(fl)fl.innerHTML=renderFileList(o.files,'order',sid,can('delete_files'));
          toast(`✅ ${file.name}`);logAct('file_added','order',{id:sid,name:file.name,size:file.size});
        } else if(scope==='trans'){
          const all=DB.get('trans');const t=all.find(x=>x.id===sid);if(!t)return;
          (t.files=t.files||[]).push(fd);DB.set('trans',all);
          const fl=document.getElementById(`transFileList_${sid}`);if(fl)fl.innerHTML=renderFileList(t.files,'trans',sid,true);
          toast(`✅ ${file.name}`);
        } else if(scope==='scan'){
          const all=DB.get('orders');const o=all.find(x=>x.id===sid);if(!o)return;
          (o.files=o.files||[]).push(fd);DB.set('orders',all);
          toast(`📄 Skan əlavə edildi`);logAct('scan_added','order',{id:sid});
          closeOverlay();setTimeout(()=>viewOrder(sid),300);
        }
      }catch(e){
        if(e.name==='QuotaExceededError'){
          toast('❌ Yaddaş dolub! LocalStorage 5MB limiti keçildi. Kiçik fayl seçin.',1);
        } else {
          toast(`❌ Xəta: ${e.message}`,1);
        }
      }
    };
    reader.onerror=()=>toast(`${file.name}: oxuma xətası`,1);
    reader.readAsDataURL(file);
  });
}

window.dlFile=(sid,idx,scope)=>{
  if(!can('download_files')){toast('Fayl endirmə icazəniz yoxdur',1);return}
  let f;
  if(scope==='temp')f=_tempFiles[+idx];
  else{const k=scope==='order'?'orders':'trans';f=(DB.get(k).find(x=>x.id===sid)?.files||[])[+idx]}
  if(!f?.data){toast('Fayl tapılmadı',1);return}
  // БАГ 14 FIX: скачиваем через blob — не делаем redirect текущей страницы
  try{
    const byteStr=atob(f.data.split(',')[1]);
    const arr=new Uint8Array(byteStr.length);
    for(let i=0;i<byteStr.length;i++)arr[i]=byteStr.charCodeAt(i);
    const blob=new Blob([arr],{type:f.type||'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=f.name;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a)},1000);
    toast(`📥 ${esc(f.name)}`);
  }catch(e){
    // Fallback — прямая ссылка если blob не работает
    const a=document.createElement('a');a.href=f.data;a.download=f.name;a.target='_blank';
    document.body.appendChild(a);a.click();setTimeout(()=>a.remove(),500);
  }
};
window.rmFile=(sid,idx,scope)=>{
  if(!can('delete_files')){toast('Fayl silmə icazəniz yoxdur',1);return}
  if(!confirm('Faylı sil?'))return;
  if(scope==='temp'){_tempFiles.splice(+idx,1);const fl=document.getElementById('tempFileList');if(fl)fl.innerHTML=renderTempFileItems();toast('Silindi');return}
  const k=scope==='order'?'orders':'trans';const all=DB.get(k);const item=all.find(x=>x.id===sid);if(!item)return;
  (item.files=item.files||[]).splice(+idx,1);DB.set(k,all);
  const fl=document.getElementById(`${scope}FileList_${sid}`);if(fl)fl.innerHTML=renderFileList(item.files,scope,sid,can('delete_files'));
  toast('Silindi');
};

window.selectOffice=id=>{
  document.querySelectorAll('[id^=off_wrap_]').forEach(el=>el.classList.remove('checked'));
  document.getElementById('off_wrap_'+id)?.classList.add('checked');
  document.getElementById('off_'+id).checked=true;
};

window.toggleSvc=id=>{
  const cb=document.getElementById('cb_'+id),wrap=document.getElementById('wrap_'+id);
  if(!cb||!wrap)return;
  cb.checked=!cb.checked;wrap.classList.toggle('checked',cb.checked);
  const panel=document.getElementById('transPanel');
  if(panel)panel.classList.toggle('show',!!document.getElementById('cb_tercume')?.checked);
};

window.updateCurrSymbol=()=>{
  const curr=document.getElementById('f_currency')?.value||'azn';
  const sym=CURR_SYM(curr);
  document.querySelectorAll('.curr-sym-label').forEach(l=>l.textContent=sym);
  calcFin(); // пересчитываем с новым символом
};

window.calcFin=()=>{
  const t=parseFloat(document.getElementById('f_total')?.value)||0;
  const p=parseFloat(document.getElementById('f_paid')?.value)||0;
  const r=parseFloat(document.getElementById('f_rusum')?.value)||0;
  const rp=parseFloat(document.getElementById('f_rusum_paid')?.value)||0;
  const curr=document.getElementById('f_currency')?.value||'azn';
  const sym=CURR_SYM(curr);
  const sd=document.getElementById('pv_debt');
  if(sd){const d=t-p;sd.textContent=d.toFixed(2)+' '+sym;sd.className='fin-val '+(d>0?'red':'green')}
  const sdd=document.getElementById('pv_duty_debt');
  if(sdd){const dd=Math.max(0,r-rp);sdd.textContent=dd>0?dd.toFixed(2)+' '+sym:'Tam ödənildi';sdd.className='fin-val '+(dd>0?'':'green');sdd.style.color=dd>0?'var(--orange)':'var(--green)'}
  const sn=document.getElementById('pv_net');
  if(sn){const n=t-r;sn.textContent=n.toFixed(2)+' '+sym;sn.className='fin-val '+(n>=0?'green':'red')}
  // Обновляем ярлыки
  const rl=document.getElementById('rusum_label');
  if(rl)rl.textContent='Rüsum ('+sym+')';
  const rpl=document.getElementById('rusum_paid_label');
  if(rpl)rpl.textContent='Rüsum ödənilən ('+sym+')';
};

// Показываем/скрываем выбор способа оплаты
window.togglePayMethod=()=>{
  const paid=parseFloat(document.getElementById('f_paid')?.value)||0;
  const wrap=document.getElementById('payMethodWrap');
  if(wrap)wrap.classList.toggle('show',paid>0);
  if(paid===0){
    PAY_METHODS.forEach(m=>{document.getElementById('pmBtn_'+m.id)?.classList.remove('selected')});
    _selectedPayMethod=null;
  }
};

// Выбор способа оплаты
let _selectedPayMethod=null;
window.selectPayMethod=method=>{
  _selectedPayMethod=method;
  PAY_METHODS.forEach(m=>{
    const btn=document.getElementById('pmBtn_'+m.id);
    if(btn)btn.classList.toggle('selected',m.id===method);
  });
};

window.saveOrder=async ()=>{
  const office=document.querySelector('input[name="office"]:checked')?.value;
  if(!office){toast('Ofis seçin',1);return}
  const name=document.getElementById('f_name')?.value.trim();
  const surname=document.getElementById('f_surname')?.value.trim()||'';
  const passport=document.getElementById('f_passport')?.value.trim()||'';
  const phone=document.getElementById('f_phone')?.value.trim();
  const totalPrice=parseFloat(document.getElementById('f_total')?.value)||0;
  const paidAmount=parseFloat(document.getElementById('f_paid')?.value)||0;
  const rusum=parseFloat(document.getElementById('f_rusum')?.value)||0;
  const rusumPaid=Math.min(parseFloat(document.getElementById('f_rusum_paid')?.value)||0,rusum);
  const payMethod=_selectedPayMethod||null;
  const currency=document.getElementById('f_currency')?.value||'azn';  // валюта
  const deadline=document.getElementById('f_deadline')?.value||'';
  const notes=document.getElementById('f_notes')?.value.trim()||'';
  const svcType='';  // название берётся из выбранных услуг
  if(!name){toast('Ad tələb olunur',1);return}
  if(!phone){toast('Telefon tələb olunur',1);return}
  const selectedServices=SERVICES_LIST.filter(s=>document.getElementById('cb_'+s.id)?.checked).map(s=>s.name);
  const customService=document.getElementById('f_customService')?.value.trim()||'';
  if(customService)selectedServices.push(customService);
  if(!selectedServices.length){toast('Ən azı bir xidmət seçin',1);return}
  const metric=document.getElementById('f_metric')?.value.trim()||'';
  const hasTercume=!!document.getElementById('cb_tercume')?.checked;
  let langFrom='',langTo='';
  if(hasTercume){
    langFrom=document.getElementById('f_langFrom')?.value||'az';
    langTo=document.getElementById('f_langTo')?.value||'tr';
    if(langFrom===langTo){toast('Dillər eyni ola bilməz',1);return}
  }
  const oid=uid('SRV');
  const orderFiles=[..._tempFiles];_tempFiles=[];
  // Создаём первоначальный платёж если была предоплата
  const initPayments=paidAmount>0?[{id:uid('PAY'),amount:paidAmount,method:payMethod,currency,date:Date.now(),paymentDate:Date.now(),who:me.name,type:'prepayment'}]:[];
  // Duty (rusum): создаём транзакцию только на оплаченную часть
  const initDutyPayments=rusumPaid>0?[{id:uid('DPY'),amount:rusumPaid,method:payMethod,currency,date:Date.now(),paymentDate:Date.now(),who:me.name}]:[];
  const item={
    id:oid,office,
    svcType:svcType||selectedServices.join(', '),
    name,surname,passport,phone,selectedServices,
    totalPrice,paidAmount,rusum,currency,
    dutyPaid:rusumPaid, dutyDebt:Math.max(0,rusum-rusumPaid), dutyPayments:initDutyPayments,
    metric,  // метрика
    payMethod,          // основной метод оплаты
    payments:initPayments,  // история платежей
    debtAmount:totalPrice-paidAmount,
    netIncome:totalPrice-rusum,
    deadline,notes,hasTercume,langFrom,langTo,
    status:'new',qrId:uid('QR'),files:orderFiles,internalNotes:[],
    createdAt:Date.now(),createdBy:me.id,createdByName:me.name,
    statusHistory:[{status:'new',label:'Yeni',who:me.name,t:Date.now()}]
  };
  const all=DB.get('orders');all.push(item);await DB.set('orders',all);
  logAct('order_created','order',{id:oid,name,office});
  if(hasTercume){
    const tid=uid('TR');
    // БАГ 18 FIX: перевод получает office заказа для изоляции
    const tr={id:tid,orderId:oid,office,clientName:name+(surname?' '+surname:''),clientPhone:phone,langFrom,langTo,notes,status:'new',assignedTo:null,files:orderFiles.map(f=>({...f,fromOrder:true})),createdAt:Date.now(),createdBy:me.id,statusHistory:[{status:'new',label:'Yeni',who:me.name,t:Date.now()}]};
    const ta=DB.get('trans');ta.push(tr);await DB.set('trans',ta);
    toast(`✅ Sifariş + Tərcümə (${orderFiles.length} fayl)`);
  } else {
    toast(`✅ Sifariş yaradıldı`);
  }
  closeOverlay();setTimeout(()=>viewOrder(oid),350);
};

let _newPayMethods={};  // хранит выбранный метод для каждого заказа

window.toggleAddPay=oid=>{
  const form=document.getElementById('addPayForm_'+oid);
  if(form)form.style.display=form.style.display==='none'?'block':'none';
};

window.selectNewPayMethod=(oid,method)=>{
  _newPayMethods[oid]=method;
  PAY_METHODS.forEach(m=>{
    const btn=document.getElementById(`np_${m.id}_${oid}`);
    if(btn)btn.classList.toggle('selected',m.id===method);
  });
};

window.addPayment=oid=>{
  const amtEl=document.getElementById('addPayAmt_'+oid)||document.getElementById('newPayAmt_'+oid);
  const amount=parseFloat(amtEl?.value)||0;
  const method=_newPayMethods[oid]||null;
  if(amount<=0){toast('Məbləği daxil edin',1);return}
  if(!method){toast('Ödəniş üsulunu seçin',1);return}
  const all=DB.get('orders');
  const o=all.find(x=>x.id===oid);if(!o)return;
  const curr=o.currency||'azn';
  if(amount>o.debtAmount+0.01){toast(`Məbləğ borcdan artıqdır (${money(o.debtAmount,curr)})`,1);return}
  // Дата всегда текущий момент — автоматическая, без ручного выбора
  const now=Date.now();
  const pay={id:uid('PAY'),amount,method,currency:curr,date:now,paymentDate:now,who:me.name,type:'debt_payment'};
  (o.payments=o.payments||[]).push(pay);
  // Пересчитываем
  o.paidAmount=(o.paidAmount||0)+amount;
  o.debtAmount=o.totalPrice-o.paidAmount;
  o.payMethod=o.payments.length===1?method:
    [...new Set(o.payments.map(p=>p.method).filter(Boolean))].length>1?'mixed':method;
  // Записываем в историю статусов
  (o.statusHistory=o.statusHistory||[]).push({
    status:o.status,
    label:`Ödəniş: +${money(amount,curr)} (${PAY_LABEL(method)})`,
    who:me.name,t:Date.now()
  });
  DB.set('orders',all);
  delete _newPayMethods[oid];
  logAct('payment_added','order',{oid,amount,method,currency:curr});
  toast(`✅ ${money(amount,curr)} (${PAY_LABEL(method)}) əlavə edildi`);
  closeOverlay();
  setTimeout(()=>viewOrder(oid),300);
};

window.removePayment=(oid,idx)=>{
  if(!can('edit_orders')){toast('İcazə yoxdur',1);return}
  if(!confirm('Bu ödənişi silmək istəyirsiniz?'))return;
  const all=DB.get('orders');
  const o=all.find(x=>x.id===oid);if(!o)return;
  const pay=(o.payments||[])[idx];if(!pay)return;
  o.payments.splice(idx,1);
  o.paidAmount=Math.max(0,(o.paidAmount||0)-pay.amount);
  o.debtAmount=o.totalPrice-o.paidAmount;
  if(o.payments.length===0){o.payMethod=null}
  else{const methods=[...new Set(o.payments.map(p=>p.method).filter(Boolean))];
    o.payMethod=methods.length>1?'mixed':methods[0]||null}
  DB.set('orders',all);
  logAct('payment_removed','order',{oid,amount:pay.amount,method:pay.method});
  toast('Ödəniş silindi');
  closeOverlay();setTimeout(()=>viewOrder(oid),300);
};

let _newDutyPayMethods={};

window.toggleDutyPay=oid=>{
  const form=document.getElementById('addDutyForm_'+oid);
  if(form)form.style.display=form.style.display==='none'?'block':'none';
};

window.selectDutyPayMethod=(oid,method)=>{
  _newDutyPayMethods[oid]=method;
  PAY_METHODS.forEach(m=>{
    const btn=document.getElementById(`dp_${m.id}_${oid}`);
    if(btn)btn.classList.toggle('selected',m.id===method);
  });
};

window.addDutyPayment=oid=>{
  const amtEl=document.getElementById('dutyPayAmt_'+oid);
  const amount=parseFloat(amtEl?.value)||0;
  const method=_newDutyPayMethods[oid]||null;
  if(amount<=0){toast('Məbləği daxil edin',1);return}
  if(!method){toast('Ödəniş üsulunu seçin',1);return}
  const all=DB.get('orders');
  const o=all.find(x=>x.id===oid);if(!o)return;
  const curr=o.currency||'azn';
  const dutyDebt=o.dutyDebt||0;
  if(amount>dutyDebt+0.01){toast(`Məbləğ rüsum borcundan artıqdır (${money(dutyDebt,curr)})`,1);return}
  const now=Date.now();
  const pay={id:uid('DPY'),amount,method,currency:curr,date:now,paymentDate:now,who:me.name};
  (o.dutyPayments=o.dutyPayments||[]).push(pay);
  o.dutyPaid=(o.dutyPaid||0)+amount;
  o.dutyDebt=Math.max(0,(o.rusum||0)-o.dutyPaid);
  (o.statusHistory=o.statusHistory||[]).push({
    status:o.status,
    label:`Rüsum ödəniş: +${money(amount,curr)} (${PAY_LABEL(method)})`,
    who:me.name,t:now
  });
  DB.set('orders',all);
  delete _newDutyPayMethods[oid];
  logAct('duty_payment_added','order',{oid,amount,method,currency:curr});
  toast(`✅ Rüsum ödənişi: ${money(amount,curr)}`);
  closeOverlay();
  setTimeout(()=>viewOrder(oid),300);
};

window.removeDutyPayment=(oid,idx)=>{
  if(!can('edit_orders')){toast('İcazə yoxdur',1);return}
  if(!confirm('Bu rüsum ödənişini silmək istəyirsiniz?'))return;
  const all=DB.get('orders');
  const o=all.find(x=>x.id===oid);if(!o||!o.dutyPayments)return;
  const removed=o.dutyPayments.splice(idx,1)[0];
  if(removed){
    o.dutyPaid=Math.max(0,(o.dutyPaid||0)-removed.amount);
    o.dutyDebt=Math.max(0,(o.rusum||0)-o.dutyPaid);
  }
  DB.set('orders',all);
  toast('Rüsum ödənişi silindi');
  closeOverlay();
  setTimeout(()=>viewOrder(oid),300);
};
